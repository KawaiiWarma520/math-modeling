---
layout: default
---

<main class="main-content">
  <div class="container">
    <article class="post">
      <header class="post-header">
        <h1>{{ page.title }}</h1>
        <div class="post-meta">
          <span>📅 {{ page.date | date: "%Y-%m-%d" }}</span>
          {% if page.categories %}
          <span>📂 {{ page.categories | join: " / " }}</span>
          {% endif %}
        </div>
      </header>
      <div class="post-content">
        {{ content }}
      </div>
    </article>
  </div>
</main>
