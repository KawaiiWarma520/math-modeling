<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  {% include header.html %}

  {{ content }}

  {% include footer.html %}

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelector('.nav-toggle')?.addEventListener('click', function() {
        document.querySelector('.main-nav').classList.toggle('open');
      });
    });
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.post-content pre').forEach(function(pre) {
        var wrapper = document.createElement('div');
        wrapper.className = 'code-wrapper';
        pre.parentNode.insertBefore(wrapper, pre);
        wrapper.appendChild(pre);
        var btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = '复制';
        wrapper.appendChild(btn);
        btn.addEventListener('click', function() {
          var code = pre.querySelector('code');
          var text = code ? code.textContent : '';
          navigator.clipboard.writeText(text).then(function() {
            btn.textContent = '已复制 ✓';
            btn.classList.add('copied');
            setTimeout(function() {
              btn.textContent = '复制';
              btn.classList.remove('copied');
            }, 2000);
          }).catch(function() {
            btn.textContent = '复制失败';
          });
        });
      });
    });
  </script>
  <!-- KaTeX: renders math -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script>
    (function() {
      // Step 1: Fix underscores that kramdown turned into <em> inside math regions
      var fixEmInMath = function() {
        var content = document.querySelector('.post-content');
        if (!content) return;
        var html = content.innerHTML;
        html = html.replace(/\$(.+?)\$/g, function(m) {
          return m.replace(/<\/?em>/g, '_');
        });
        html = html.replace(/\$\$([\s\S]+?)\$\$/g, function(m) {
          return m.replace(/<\/?em>/g, '_');
        });
        content.innerHTML = html;
      };
      fixEmInMath();

      // Step 2: Run KaTeX auto-render
      try {
        renderMathInElement(document.body, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '\\[', right: '\\]', display: true},
            {left: '\\(', right: '\\)', display: false},
            {left: '$', right: '$', display: false}
          ],
          throwOnError: false
        });
      } catch(e) {}
    })();
  </script>
  <!-- Anchor offset: precise scroll for sticky header -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var HEADER_OFFSET = 80;
      document.addEventListener('click', function(e) {
        var link = e.target.closest('a[href^="#"]');
        if (!link) return;
        var id = link.getAttribute('href').slice(1);
        if (!id) return;
        var target = document.getElementById(id);
        if (!target) return;
        e.preventDefault();
        var rect = target.getBoundingClientRect();
        var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        window.scrollTo({ top: rect.top + scrollTop - HEADER_OFFSET, behavior: 'smooth' });
        history.pushState(null, null, '#' + id);
      });
    });
  </script>
</body>
</html>
