<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
</head>
<body>

  {% include header.html %}

  {{ content }}

  {% include footer.html %}

  <script>
    document.querySelector('.nav-toggle')?.addEventListener('click', function() {
      document.querySelector('.main-nav').classList.toggle('open');
    });
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof renderMathInElement !== 'undefined') {
        renderMathInElement(document.body, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '\\[', right: '\\]', display: true},
            {left: '\\(', right: '\\)', display: false},
            {left: '$', right: '$', display: false}
          ],
          throwOnError: false
        });
      }
      // Also render math from kramdown mathjax script tags
      document.querySelectorAll('script[type="math/tex"]').forEach(function(el) {
        var display = false;
        var tex = el.textContent;
        var wrapper = document.createElement('span');
        try {
          katex.render(tex, wrapper, {displayMode: display, throwOnError: false});
          el.parentNode.replaceChild(wrapper, el);
        } catch(e) {}
      });
      document.querySelectorAll('script[type="math/tex; mode=display"]').forEach(function(el) {
        var tex = el.textContent;
        var wrapper = document.createElement('div');
        try {
          katex.render(tex, wrapper, {displayMode: true, throwOnError: false});
          el.parentNode.replaceChild(wrapper, el);
        } catch(e) {}
      });
    });
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Wrap code blocks for copy button
      document.querySelectorAll('.post-content pre').forEach(function(pre) {
        var wrapper = document.createElement('div');
        wrapper.className = 'code-wrapper';
        pre.parentNode.insertBefore(wrapper, pre);
        wrapper.appendChild(pre);

        var btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = '复制';
        wrapper.appendChild(btn);

        btn.addEventListener('click', function() {
          var code = pre.querySelector('code');
          var text = code ? code.textContent : '';
          navigator.clipboard.writeText(text).then(function() {
            btn.textContent = '已复制 ✓';
            btn.classList.add('copied');
            setTimeout(function() {
              btn.textContent = '复制';
              btn.classList.remove('copied');
            }, 2000);
          }).catch(function() {
            btn.textContent = '复制失败';
          });
        });
      });
    });
  </script>
</body>
</html>
