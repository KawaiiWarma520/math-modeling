<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
</head>
<body>

  {% include header.html %}

  {{ content }}

  {% include footer.html %}

  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script>
    // Immediately render all math from kramdown's mathjax script tags.
    // kramdown converts $...$ to <script type="math/tex"> tags and $$...$$ to
    // <script type="math/tex; mode=display"> tags, preserving underscores.
    (function() {
      var els, i, el, tex, wrapper;
      els = document.querySelectorAll('script[type="math/tex"]');
      for (i = 0; i < els.length; i++) {
        el = els[i];
        tex = el.textContent;
        wrapper = document.createElement('span');
        try { katex.render(tex, wrapper, {displayMode: false, throwOnError: false}); } catch(e) { wrapper.textContent = tex; }
        el.parentNode.replaceChild(wrapper, el);
      }
      els = document.querySelectorAll('script[type="math/tex; mode=display"]');
      for (i = 0; i < els.length; i++) {
        el = els[i];
        tex = el.textContent;
        wrapper = document.createElement('div');
        try { katex.render(tex, wrapper, {displayMode: true, throwOnError: false}); } catch(e) { wrapper.textContent = tex; }
        el.parentNode.replaceChild(wrapper, el);
      }
    })();
  </script>
  <script>
    document.querySelector('.nav-toggle')?.addEventListener('click', function() {
      document.querySelector('.main-nav').classList.toggle('open');
    });
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.post-content pre').forEach(function(pre) {
        var wrapper = document.createElement('div');
        wrapper.className = 'code-wrapper';
        pre.parentNode.insertBefore(wrapper, pre);
        wrapper.appendChild(pre);
        var btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = '复制';
        wrapper.appendChild(btn);
        btn.addEventListener('click', function() {
          var code = pre.querySelector('code');
          var text = code ? code.textContent : '';
          navigator.clipboard.writeText(text).then(function() {
            btn.textContent = '已复制 ✓';
            btn.classList.add('copied');
            setTimeout(function() {
              btn.textContent = '复制';
              btn.classList.remove('copied');
            }, 2000);
          }).catch(function() {
            btn.textContent = '复制失败';
          });
        });
      });
    });
  </script>
</body>
</html>
